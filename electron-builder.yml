appId: com.electron.app
productName: Web Vitals Inspector
directories:
  buildResources: build
# Run build/afterSign.js after the app is assembled to apply free ad-hoc
# code signing. This prevents the "damaged app" error on Apple Silicon Macs
# and makes the "Open Anyway" bypass appear in Privacy & Security.
afterSign: build/afterSign.js
# Disable asar so that node_modules/.bin/lighthouse.cmd can be spawned as a
# real subprocess and Lighthouse can require() its own modules at runtime.
asar: false
# Bundle the project-local Chromium download (.puppeteer-cache/) into the app.
# After cloning, run `npm install` once so Puppeteer downloads Chrome there.
extraResources:
  - from: .puppeteer-cache
    to: puppeteer-cache
    filter:
      - '**/*'
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!.puppeteer-cache/**'
win:
  executableName: web-vitals-inspector
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # Setting identity to null prevents electron-builder from trying to locate a
  # Developer ID certificate. The actual signing is handled by afterSign.js
  # using an ad-hoc identity (-), which is free and requires no Apple account.
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  # Include architecture in the filename so users can pick the right build:
  #   *-arm64.dmg  → Apple Silicon (M1 / M2 / M3 / M4)
  #   *-x64.dmg   → Intel Mac
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
