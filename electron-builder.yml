appId: com.webvitalsinspector.app
productName: Web Vitals Inspector
directories:
  buildResources: build
# Ensure the Puppeteer Chrome cache exists before packaging starts.
# If .puppeteer-cache is missing the hook downloads Chrome automatically.
beforeBuild: build/before-build.js
# Apply free ad-hoc code signing on macOS after the app is assembled.
# This prevents the "damaged app" error on Apple Silicon Macs and surfaces
# the "Open Anyway" bypass in System Settings → Privacy & Security.
afterSign: build/afterSign.js
# Disable asar so that Lighthouse can require() its own modules at runtime.
asar: false
# Bundle the Puppeteer Chrome download into the packaged app so it runs on
# machines that have never executed `npm install`.
extraResources:
  - from: .puppeteer-cache
    to: puppeteer-cache
    filter:
      - '**/*'
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!.puppeteer-cache/**'
win:
  executableName: web-vitals-inspector
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # Setting identity to null prevents electron-builder from trying to locate a
  # Developer ID certificate. The actual signing is handled by afterSign.js
  # using an ad-hoc identity (-), which is free and requires no Apple account.
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  # Include architecture in the filename so users can pick the right build:
  #   *-arm64.dmg  → Apple Silicon (M1 / M2 / M3 / M4)
  #   *-x64.dmg   → Intel Mac
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: Web Vitals Inspector
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
